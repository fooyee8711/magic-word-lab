<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>✨ Magic Lexicon Lab | Word Alchemy ✨</title>
    <style>
        /* 引入可愛風字體 */
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Quicksand:wght@500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            /* 馬卡龍色系 */
            --cherry: #ffafcc; /* 櫻花粉 */
            --mint: #caffbf;   /* 薄荷綠 */
            --lemon: #fdffb6;  /* 檸檬黃 */
            --glow-blue: #bde0fe; /* 發光藍 */
            --lavender: #cdb4db; /* 薰衣草紫 */
            --ink: #5a3e2e;    /* 柔和深褐 (代替死黑) */
            --paper: #fffef7;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fff9ef 0%, #fff2e0 100%);
            font-family: 'Quicksand', 'Comic Neue', sans-serif;
            padding: 24px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--ink);
        }

        /* 去掉實驗室感，改為夢幻魔導書 (Grimoire) 風格 */
        .grimoire {
            max-width: 1200px;
            width: 100%;
            background: var(--paper);
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 220, 180, 0.2) 1%, transparent 1.5%);
            border-radius: 56px 32px 64px 40px; /* 不規則的可愛邊緣 */
            border: 2px solid #ffe0b5;
            padding: 30px 28px 40px;
            position: relative;
            box-shadow: 10px 10px 0px rgba(192, 160, 128, 0.1);
            transition: all 0.2s ease;
        }

        /* 穩定性水晶球 (美化為馬卡龍藍) */
        .crystal-orb {
            position: absolute;
            top: 20px;
            right: 30px;
            width: 56px;
            height: 56px;
            background: radial-gradient(circle at 35% 35%, #bde0fe, #a0c4e8);
            border-radius: 50%;
            border: 2px solid #ffe6c7;
            cursor: pointer;
            z-index: 20;
            transition: 0.3s;
        }
        
        .crystal-orb::after {
            content: "✨";
            position: absolute;
            font-size: 28px;
            top: 10px;
            left: 14px;
            opacity: 0.8;
        }

        .orb-pulse {
            animation: breathPulse 1.2s ease-in-out infinite;
        }

        @keyframes breathPulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.7; }
        }

        /* 階段切換 */
        .phase { display: none; animation: fadeIn 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        .active-phase { display: flex; flex-direction: column; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 可愛標題 */
        .hand-title {
            font-size: 2rem;
            font-weight: bold;
            color: #c06c8c;
            letter-spacing: -0.3px;
            border-left: 8px solid var(--cherry);
            padding-left: 20px;
            margin-bottom: 24px;
            transform: rotate(-0.3deg); /* 輕微傾斜增加手寫感 */
        }

        /* 目標單字卡 (Lemon Yellow) */
        .target-word-card {
            background: var(--lemon);
            border-radius: 60px;
            padding: 12px 28px;
            display: inline-block;
            margin: 10px 0 20px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #5a3e2e;
            border: 2px solid #ffe0a3;
        }
        
        .magic-glow { animation: goldenGlow 0.6s ease-out; }
        @keyframes goldenGlow {
            0% { background: #fdffb6; }
            50% { background: #fff4b0; box-shadow: 0 0 0 3px rgba(253, 255, 182, 0.6); }
            100% { background: #fdffb6; }
        }

        /* 插槽區 (核心修復：使用 Flex 居中，自動適應數量) */
        .slot-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center; /* 關鍵：居中對齊 */
            gap: 28px;
            margin: 20px 0 30px;
        }

        .slot {
            background: #fffaf0;
            border: 2px dashed #e2c7a1;
            border-radius: 32px;
            min-width: 170px;
            padding: 18px 12px;
            text-align: center;
        }

        .slot-label {
            font-weight: bold;
            font-size: 1.2rem;
            background: var(--lemon);
            display: inline-block;
            padding: 4px 16px;
            border-radius: 40px;
            margin-bottom: 12px;
            color: #6b4c3b;
            border: 1px solid #ffe0a0;
        }

        .slot-value {
            font-size: 1.5rem;
            font-weight: bold;
            min-height: 70px;
            background: rgba(202, 255, 191, 0.2); /* 薄荷綠透明 */
            border-radius: 32px;
            padding: 10px;
            color: #2c5a5a;
        }

        /* 零件庫 (Glow Blue) */
        .rune-parts {
            background: #fef5e6;
            border-radius: 68px;
            padding: 20px;
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            border: 2px solid #ffd89a;
        }

        .rune {
            background: var(--glow-blue);
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: grab;
            display: inline-block;
            touch-action: none;
            color: #2c3e4e;
            border: 2px solid #fff6e0;
        }
        
        .rune:active { cursor: grabbing; }

        /* 故事卡 (水彩 parchmant 感) */
        .story-card {
            background: #fffef0;
            border-radius: 48px;
            padding: 28px;
            line-height: 1.7;
            font-size: 1.2rem;
            border: 2px solid #ffe6c7;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .highlight-word {
            background-color: var(--cherry);
            font-weight: bold;
            padding: 0 5px;
            border-radius: 14px;
            text-decoration: underline;
            text-decoration-thickness: 3px;
            text-decoration-color: #ff6f91;
        }

        /* 填空輸入框 */
        .cloze-input {
            font-size: 1.3rem;
            padding: 12px 20px;
            border-radius: 60px;
            border: 2px solid #eeddbb;
            background: white;
            width: 100%;
            max-width: 320px;
            font-family: monospace;
        }
        
        .cloze-correct {
            background-color: var(--mint) !important;
            border-color: #8fc97f !important;
        }

        /* 通用按鈕 (Cherry Pink) */
        button {
            background: var(--cherry);
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 20px;
            cursor: pointer;
            font-family: inherit;
            border: 2px solid #ffdbaf;
        }
        
        button:active { transform: translateY(2px); }

        /* 詞源遊戲選項 */
        .option-group { display: flex; gap: 20px; flex-wrap: wrap; margin: 20px 0; }
        .root-option {
            background: var(--lemon);
            padding: 12px 24px;
            border-radius: 48px;
            cursor: pointer;
            font-weight: bold;
            border: 2px solid #ffe0a3;
        }
        
        .root-option.selected-correct {
            background: var(--mint);
            border-color: #8fc97f;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.8rem;
            color: #c0a080;
        }

        /* 響應式調整 */
        @media (max-width: 700px) {
            .grimoire { padding: 20px; }
            .rune { font-size: 1rem; padding: 8px 18px; }
            .slot { min-width: 120px; }
        }
    </style>
</head>
<body>

<div class="grimoire" style="position: relative;">
    <div class="crystal-orb" id="crystalOrb"></div>
    <h1 class="hand-title">✧ Lexicon Forge ✧</h1>

    <div id="phase1" class="phase active-phase">
        <div style="text-align: center;">
            <div class="target-word-card" id="targetWordDisplay">⚡ loading...</div>
            <p style="margin: 8px 0 0; font-style: italic; color:#a8815f;">🔍 Drag the magical runes into the matching slots</p>
        </div>

        <div class="slot-container" id="slotContainer">
            </div>

        <div class="rune-parts" id="runeLibrary">
            </div>
        <button id="resetPhase1Btn">🪄 Reset Puzzle</button>
    </div>

    <div id="phase2" class="phase">
        <div class="story-card" id="storyText">
            </div>
        <button id="toPhase3Btn">📖 Go to Spelling Trial →</button>
    </div>

    <div id="phase3" class="phase">
        <div style="background:#fff5e6; border-radius: 48px; padding: 24px; border: 2px solid #ffe0c0;">
            <p style="font-size:1.4rem; margin-bottom: 16px;">✍️ Spell the missing word</p>
            <div id="clozeSentence" style="font-size:1.2rem; margin-bottom: 20px; line-height:1.5;">
                </div>
            <input type="text" id="spellInput" class="cloze-input" placeholder="type the full word here..." autocomplete="off">
            <div><button id="nextPhase3Btn" style="display:none;">🔮 Etymology Game →</button></div>
        </div>
    </div>

    <div id="phase4" class="phase">
        <div style="background:#f6f2e3; border-radius: 48px; padding: 24px; border: 2px solid #ffe0c0;">
            <p>🌱 Which word shares the same root family?</p>
            <div id="rootOptions" class="option-group">
                </div>
            <button id="nextWordBtn" class="disabled-btn">✨ Next Word ✨</button>
        </div>
    </div>
    
    <footer>⚡ Crystal orb pulses when stability drops — place correct pieces to shine!</footer>
</div>

<script>
    // ------------------------------ 核心數據與邏輯 ------------------------------
    let wordsData = [];
    let currentWordIndex = 0;
    let currentWordObj = null;
    let solvedSlots = { prefix: false, root: false, suffix: false };

    // UI 元素
    const crystal = document.getElementById('crystalOrb');
    const targetWordSpan = document.getElementById('targetWordDisplay');
    const slotContainer = document.getElementById('slotContainer');
    const runeLibrary = document.getElementById('runeLibrary');
    const resetBtn = document.getElementById('resetPhase1Btn');
    const storyContainer = document.getElementById('storyText');
    const toPhase3Btn = document.getElementById('toPhase3Btn');
    const clozeSentenceDiv = document.getElementById('clozeSentence');
    const spellInput = document.getElementById('spellInput');
    const nextPhase3Btn = document.getElementById('nextPhase3Btn');
    const rootOptionsDiv = document.getElementById('rootOptions');
    const nextWordBtn = document.getElementById('nextWordBtn');

    // 備用詞庫（如果外部json加載失敗）
    const FALLBACK_WORDS = [
        { word: "construction", prefix: "con-", root: "struct", suffix: "-ion", story: "The great cathedral was a marvel of construction. Construction is key.", cloze_context: "The ______ of the bridge took ten years.", related_options: ["instruct","structure","destruction"], correct_related: "structure" }
    ];

    // 1. 初始化：加載資料
    async function initWords() {
        try {
            const response = await fetch('words.json');
            wordsData = await response.json();
        } catch(e) {
            console.warn("使用備用詞庫");
            wordsData = FALLBACK_WORDS;
        }
        loadWord(0);
    }

    // 2. 加載單字並重新生成 UI
    function loadWord(idx) {
        currentWordObj = wordsData[idx % wordsData.length];
        currentWordIndex = idx % wordsData.length;
        
        targetWordSpan.innerText = `✨ ${currentWordObj.word.toUpperCase()} ✨`;
        
        // 重置狀態與插槽 UI
        solvedSlots = { prefix: false, root: false, suffix: false };
        generateSlots();
        generateRunes();

        // 重置後續階段
        spellInput.value = "";
        nextPhase3Btn.style.display = "none";
        crystal.classList.remove('orb-pulse');
        
        showPhase(1);
    }

    // 3. 核心修復：動態生成插槽，排除沒有 suffix 的情況
    function generateSlots() {
        slotContainer.innerHTML = ''; // 清空

        // 生成前綴和詞根 (必備)
        const parts = [
            { type: 'prefix', label: '📜 PREFIX', value: currentWordObj.prefix },
            { type: 'root', label: '🌿 ROOT', value: currentWordObj.root }
        ];

        // 排查：檢查是否有後綴 (如果為空字串 "", 則不生成)
        if (currentWordObj.suffix && currentWordObj.suffix !== "") {
            parts.push({ type: 'suffix', label: '✨ SUFFIX', value: currentWordObj.suffix });
        } else {
            // 如果沒有後綴，則該部分視為自動解決
            solvedSlots.suffix = true;
        }

        parts.forEach(part => {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.dataset.slotType = part.type;
            slot.dataset.expected = part.value; // 存儲預期值

            const label = document.createElement('div');
            label.className = 'slot-label';
            label.innerText = part.label;
            slot.appendChild(label);

            const valueDisplay = document.createElement('div');
            valueDisplay.className = 'slot-value';
            valueDisplay.innerText = "———"; // 預設顯示
            slot.appendChild(valueDisplay);

            // 綁定 Drop 事件
            slot.addEventListener('dragover', e => e.preventDefault());
            slot.addEventListener('drop', handleDrop);

            slotContainer.appendChild(slot);
        });
    }

    // 生成零件庫
    function generateRunes() {
        runeLibrary.innerHTML = '';
        
        let pieces = [];
        // 正確答案
        pieces.push({ type: 'prefix', value: currentWordObj.prefix, isCorrect: true });
        pieces.push({ type: 'root', value: currentWordObj.root, isCorrect: true });
        if (!solvedSlots.suffix) {
            pieces.push({ type: 'suffix', value: currentWordObj.suffix, isCorrect: true });
        }

        // 隨機干擾零件
        const decoys = ['re-', 'port', '-ion', 'dict', 'struct', '-able', 'mis-', 'con-', '-ment'];
        const numDecoys = 3;
        for (let i=0; i<numDecoys; i++) {
            pieces.push({ type: 'decoy', value: decoys[Math.floor(Math.random()*decoys.length)], isCorrect: false });
        }

        // 洗牌
        pieces.sort(() => Math.random() - 0.5);

        pieces.forEach(p => {
            const rune = document.createElement('div');
            rune.className = 'rune';
            rune.draggable = true;
            rune.innerText = p.value;
            rune.dataset.val = p.value;
            rune.dataset.type = p.type;
            
            // 拖曳事件
            rune.addEventListener('dragstart', handleDragStart);
            runeLibrary.appendChild(rune);
        });
    }

    // 處理 Drop 邏輯
    function handleDrop(e) {
        e.preventDefault();
        const draggedVal = e.dataTransfer.getData('text');
        
        // 檢查值是否匹配 (這顆符文的值是否等於插槽 dataset.expected 的值)
        if (draggedVal === this.dataset.expected) {
            this.querySelector('.slot-value').innerText = draggedVal;
            this.classList.add('correct');
            addMagicGlow(this);
            
            const type = this.dataset.slotType;
            solvedSlots[type] = true;
            checkCompletionAndJump();
        } else {
            triggerInstability();
        }
    }

    // 檢查是否所有插槽都解決了，自動跳轉
    function checkCompletionAndJump() {
        const slotsNeeded = (currentWordObj.suffix === "") ? 2 : 3;
        const slotsFilled = (solvedSlots.prefix?1:0) + (solvedSlots.root?1:0) + (currentWordObj.suffix==="" ? 0 : (solvedSlots.suffix?1:0));

        if (slotsFilled >= slotsNeeded) {
            // 自動跳轉到 Story 頁面
            setTimeout(() => {
                showPhase(2);
                renderStoryPhase();
            }, 800);
        }
    }

    // 其他原本邏輯 (修正 storyRegex)
    function renderStoryPhase() {
        let story = currentWordObj.story;
        // 使用正則表達式，確保將所有匹配單字高亮 (不分大小寫)
        let regex = new RegExp(`\\b(${currentWordObj.word})\\b`,'gi');
        storyContainer.innerHTML = story.replace(regex, match => `<span class="highlight-word">${match}</span>`);
    }

    // 輔助工具
    function triggerInstability() { crystal.classList.add('orb-pulse'); setTimeout(() => crystal.classList.remove('orb-pulse'), 1200); }
    function addMagicGlow(el) { el.classList.add('magic-glow'); setTimeout(() => el.classList.remove('magic-glow'), 600); }
    function showPhase(pid) { for(let i=1;i<=4;i++) document.getElementById(`phase${i}`).classList.remove('active-phase'); document.getElementById(`phase${pid}`).classList.add('active-phase'); }
    function handleDragStart(e) { e.dataTransfer.setData('text', this.dataset.val); }
    function resetPhase1() { loadWord(currentWordIndex); }
    function nextWord() { loadWord(currentWordIndex+1); }

    // 事件綁定
    initWords();
    resetBtn.addEventListener('click', resetPhase1);
    toPhase3Btn.addEventListener('click', ()=>{ showPhase(3); /* setupCloze()*/ });
    nextPhase3Btn.addEventListener('click', ()=>{ showPhase(4); /* setupEtymologyGame() */ });
    nextWordBtn.addEventListener('click', nextWord);

</script>
</body>
</html>
